<!DOCTYPE html>
<html>
<head>
<title>SLN Online Exam</title>

<style>

body{
font-family:Arial;
background:#f2f2f2;
text-align:center;
}

.container{
width:70%;
margin:auto;
background:light green;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px gray;
}

.question{
text-align:left;
margin-top:15px;
}

button{
background:blue;
color:white;
padding:10px 20px;
border:none;
border-radius:5px;
font-size:16px;
cursor:pointer;
}

#timer{
color:red;
font-weight:bold;
}

</style>

</head>

<body>

<div class="container">

<h2>S.L.N Online Examination</h2>

<p>
Student Name:
<input type="text" id="studentName">
</p>

<p id="timer">Time Left: 30:00</p>

<div id="quiz"></div>

<br>

<button onclick="submitExam()">Submit Exam</button>

<h3 id="result"></h3>

</div>

<script src="question.js"></script>

<script>

// TIMER

let time = 1800;

let timer = setInterval(function(){

let minutes = Math.floor(time/60);
let seconds = time%60;

document.getElementById("timer").innerHTML =
"Time Left: "+minutes+":"+(seconds<10?"0":"")+seconds;

time--;

if(time < 0){
clearInterval(timer);
submitExam();
}

},1000);


// SHOW QUESTIONS

const quiz = document.getElementById("quiz");

questions.forEach((q,i)=>{

quiz.innerHTML +=
`<div class="question">

<p><b>${q.question}</b></p>

<label><input type="radio" name="q${i}" value="a"> ${q.a}</label><br>

<label><input type="radio" name="q${i}" value="b"> ${q.b}</label><br>

<label><input type="radio" name="q${i}" value="c"> ${q.c}</label><br>

<label><input type="radio" name="q${i}" value="d"> ${q.d}</label>

</div><br>`;

});


// RESULT

function submitExam(){

let score = 0;

let score = 0;

questions.forEach((q,i)=>{

let answer = document.querySelector('input[name="q'+i+'"]:checked');

if(answer && answer.value === q.correct){
score++;
}

});

let name = document.getElementById("studentName").value;

document.getElementById("result").innerHTML =
"Student: " + name + "<br>Score: " + score + " / " + questions.length;

</script>

</body>
</html>
