<!DOCTYPE html>
<html>
<head>
<title>Simple Online Exam</title>

<style>

body{
font-family: Arial;
background:#f2f2f2;
text-align:center;
}

.container{
width:70%;
margin:auto;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0px 0px 10px gray;
}

h2{
color:#333;
}

.question{
text-align:left;
margin-top:20px;
}

button{
background:blue;
color:white;
padding:10px 20px;
border:none;
border-radius:5px;
font-size:16px;
cursor:pointer;
}

#timer{
color:red;
font-weight:bold;
}

</style>

</head>

<body>

<div class="container">

<h2>Simple Online Exam</h2>

<p id="timer">Time Left: 30:00</p>

<div id="quiz"></div>

<br>

<button onclick="submitExam()">Submit Exam</button>

<h3 id="result"></h3>

</div>

<script src="question.js"></script>

<script>

// TIMER

let time = 1800;

let timer = setInterval(function(){

let minutes = Math.floor(time/60);
let seconds = time%60;

document.getElementById("timer").innerHTML =
"Time Left: "+minutes+":"+(seconds<10?"0":"")+seconds;

time--;

if(time < 0){
clearInterval(timer);
submitExam();
}

},1000);


// RESULT

function submitExam(){

let score = 0;

questions.forEach((q,i)=>{

let answer = document.querySelector('input[name="q'+i+'"]:checked');

if(answer && answer.value === q.correct){
score++;
}

});

document.getElementById("result").innerHTML =
"Your Score: "+score+" / "+questions.length;

}

</script>

</body>
</html>
