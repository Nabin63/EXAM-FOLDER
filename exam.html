<!DOCTYPE html>
<html>
<head>
<title>Online Exam</title>

<style>

body{
font-family: Arial;
background:#f0f0ff;
text-align:center;
}

.box{
background:light green;
padding:20px;
margin:40px auto;
width:60%;
border-radius:10px;
}

#timer{
color:red;
font-size:22px;
font-weight:bold;
}

.submitBox{
position:fixed;
bottom:20px;
right:20px;
}

button{
padding:15px 25px;
font-size:18px;
background:blue;
color:white;
border:none;
border-radius:8px;
}

</style>

</head>

<body onload="loadQuestions(); startTimer();">

<h2 id="timer">Time Left: 30:00</h2>

<div class="box">
<h1>Simple Online Exam</h1>

<div id="quiz"></div>

</div>

<div class="submitBox">
<button onclick="submitExam()">Submit Exam</button>
</div>

<script src="questions.js"></script>

<script>

let time = 1800;

function startTimer(){

setInterval(function(){

let m = Math.floor(time/60);
let s = time%60;

document.getElementById("timer").innerHTML =
"Time Left: "+m+":"+ (s<10?"0"+s:s);

time--;

if(time<=0){
submitExam();
}

},1000);

}

function loadQuestions(){

let quiz = document.getElementById("quiz");

questions.forEach((q,index)=>{

quiz.innerHTML += "<h3>"+(index+1)+". "+q.question+"</h3>";

q.options.forEach(opt=>{

quiz.innerHTML +=
'<input type="radio" name="q'+index+'" value="'+opt+'"> '+opt+'<br>';

});

quiz.innerHTML += "<br>";

});

}

function submitExam(){

let score = 0;

questions.forEach((q,index)=>{

let selected =
document.querySelector('input[name="q'+index+'"]:checked');

if(selected){

if(selected.value == q.answer){
score++;
}

}

});

localStorage.setItem("score",score);
localStorage.setItem("total",questions.length);

window.location.href="result.html";

}

</script>

</body>
</html>
